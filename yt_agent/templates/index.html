<!DOCTYPE html>
<html>
<head>

<title>YouTube AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#020617;
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}

.sidebar input,
.sidebar select{
padding:10px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

.sidebar button{
padding:10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HERO */

.hero{
text-align:center;
padding:30px;
border-bottom:1px solid #1e293b;
}

.hero h1{
margin:0;
font-size:32px;
}

.hero p{
opacity:0.6;
margin-top:8px;
}

/* VIDEO */

.video{
max-width:800px;
margin:20px auto;
}

.video iframe{
width:100%;
height:320px;
border-radius:10px;
border:none;
}

/* CHAT */

.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:18px;
}

.message{
max-width:800px;
margin:auto;
width:100%;
}

.user{
font-weight:600;
color:#f8fafc;
}

.ai{
color:#93c5fd;
}

.bubble{
font-size:16px;
line-height:1.7;
}

/* INPUT */

.inputArea{
border-top:1px solid #1e293b;
padding:15px;
display:flex;
justify-content:center;
}

.inputWrap{
width:800px;
display:flex;
gap:10px;
}

.inputWrap input{
flex:1;
padding:14px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
font-size:15px;
}

.inputWrap button{
padding:14px 18px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

</style>

</head>

<body>


<div class="sidebar">

<input id="url" placeholder="YouTube URL">

<button onclick="processVideo()">Process</button>

<select id="lang">
<option value="english">English</option>
<option value="hindi">Hindi</option>
<option value="both">Both</option>
</select>

<button onclick="clearChat()">Clear Chat</button>

</div>



<div class="main">

<div class="hero">
<h1>🚀 YouTube AI Assistant</h1>
<p>Ask questions about any YouTube video</p>
</div>

<div id="video" class="video"></div>

<div id="chat" class="chat"></div>

<div class="inputArea">

<div class="inputWrap">

<input id="question"
placeholder="Ask about the video..."
onkeypress="enterSend(event)">

<button onclick="ask()">Send</button>

</div>

</div>

</div>



<script>

/* VIDEO ID */

function videoID(url){

if(url.includes("v="))
return url.split("v=")[1].split("&")[0]

if(url.includes("youtu.be"))
return url.split("/").pop()

return null
}

/* SHOW VIDEO */

function showVideo(url){

let id=videoID(url)

document.getElementById("video").innerHTML=
`<iframe src="https://www.youtube.com/embed/${id}"></iframe>`
}

/* PROCESS VIDEO */

async function processVideo(){

let url=document.getElementById("url").value

showVideo(url)

await fetch("/process_video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({url:url})
})

addMessage("Video processed. Ask anything about it.","ai")
}

/* ADD MESSAGE */

function addMessage(text,type){

let chat=document.getElementById("chat")

chat.innerHTML+=`
<div class="message ${type}">
<div class="bubble">${text}</div>
</div>
`

chat.scrollTop=chat.scrollHeight
}

/* ASK */

async function ask(){

let q=document.getElementById("question").value
let lang=document.getElementById("lang").value

if(!q) return

addMessage(q,"user")

document.getElementById("question").value=""

addMessage("Thinking...","ai")

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
question:q,
language:lang
})
})

let data=await res.json()

document.querySelector(".ai:last-child").remove()

addMessage(data.answer,"ai")
}

/* ENTER */

function enterSend(e){
if(e.key==="Enter") ask()
}

/* CLEAR */

function clearChat(){
document.getElementById("chat").innerHTML=""
}

</script>

</body>
</html>
